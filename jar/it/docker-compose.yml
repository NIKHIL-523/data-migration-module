# Local cloud-emulator stack for validating the multi-cloud IcebergMigrate
# JAR end-to-end. Each emulator speaks the real Hadoop FS wire protocol so
# the same JAR + CloudFsConfig code path runs against all three.
#
# Bring up: docker compose -f jar/it/docker-compose.yml up -d
# Tear down: docker compose -f jar/it/docker-compose.yml down -v
#
# Bucket bootstrap and round-trip drivers live in ./scripts/.

services:

  # --- AWS S3 emulator (MinIO) ----------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot bucket creator so tests have a known source + target bucket.
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio: {condition: service_healthy}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/iceberg-source &&
      mc mb --ignore-existing local/iceberg-target &&
      echo 'minio buckets ready';"

  # --- Azure Storage emulator (Azurite) -------------------------------
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.32.0
    command: >
      azurite --blobHost 0.0.0.0 --blobPort 10000
              --queueHost 0.0.0.0 --queuePort 10001
              --tableHost 0.0.0.0 --tablePort 10002
              --skipApiVersionCheck
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    # Azurite default account / key (well-known):
    #   account = devstoreaccount1
    #   key     = Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==

  # --- GCS emulator (fake-gcs-server) ---------------------------------
  fake-gcs:
    image: fsouza/fake-gcs-server:1.50.2
    command: >
      -scheme http -host 0.0.0.0 -port 4443 -public-host fake-gcs:4443
      -data /data -external-url http://fake-gcs:4443
    ports:
      - "4443:4443"
    volumes:
      - fake-gcs-data:/data

  # --- Spark runner ---------------------------------------------------
  # Local-only Spark 3.5.5 Scala 2.13 build (production uses the private
  # prevalentai image). Built from ./spark/Dockerfile — pulls the Apache
  # binary tarball on top of temurin JRE 17. JAR built by `sbt assembly`
  # is mounted read-only at /opt/spark/jars-extra so spark-submit sees
  # it; tests `docker compose exec spark spark-submit ...`.
  spark:
    build:
      context: ./spark
      args:
        SPARK_VERSION: 3.5.5
    image: data-migration-iceberg/spark:3.5.5-scala2.13
    user: root
    environment:
      # Picked up by AWS DefaultAWSCredentialsProviderChain inside our
      # explicit provider list, so the MinIO emulator authenticates without
      # any test-only code path in CloudFsConfig.
      AWS_ACCESS_KEY_ID:     minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ../target/scala-2.13:/opt/spark/jars-extra:ro     # sbt assembly output
      - ./scripts:/opt/it/scripts:ro
    depends_on:
      minio:    {condition: service_healthy}
      minio-init: {condition: service_completed_successfully}
      azurite:  {condition: service_started}
      fake-gcs: {condition: service_started}
    command: tail -f /dev/null   # keep alive; tests exec into it

volumes:
  minio-data:
  azurite-data:
  fake-gcs-data:
